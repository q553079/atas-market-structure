services:
  redis:
    image: redis:7.2-alpine
    container_name: atas-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: atas-clickhouse
    environment:
      CLICKHOUSE_DB: market_data
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"  # HTTP API
      - "9000:9000"  # Native TCP
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # Best practice on Windows: use Docker named volumes for high I/O databases.
      # Avoid mapping ClickHouse data dir directly to NTFS project folders.
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  clickhouse-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atas-clickhouse-init
    command: ["python", "scripts/init_clickhouse.py"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: market_data
      CLICKHOUSE_ENABLE_INGESTIONS: ${CLICKHOUSE_ENABLE_INGESTIONS:-false}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  realtime-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atas-realtime-api
    command: ["python", "-m", "atas_market_structure.realtime_server"]
    environment:
      ATAS_RT_HOST: 0.0.0.0
      ATAS_RT_PORT: 8090
      ATAS_RT_REDIS_URL: redis://redis:6379/0
      ATAS_RT_TICK_CHANNEL: market_ticks
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: market_data
      ATAS_RT_CLICKHOUSE_TABLE: ticks_raw
      ATAS_RT_BATCH_SIZE: 5000
      ATAS_RT_FLUSH_INTERVAL_SECONDS: 1.0
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
