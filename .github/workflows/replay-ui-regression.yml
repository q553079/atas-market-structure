name: Replay UI Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/atas_market_structure/static/**"
      - "tests/playwright_replay_ui_fix.spec.js"
      - "tests/playwright_support/fake_workbench_ui_server.py"
      - ".github/workflows/replay-ui-regression.yml"
  push:
    branches:
      - main
    paths:
      - "src/atas_market_structure/static/**"
      - "tests/playwright_replay_ui_fix.spec.js"
      - "tests/playwright_support/fake_workbench_ui_server.py"
      - ".github/workflows/replay-ui-regression.yml"

jobs:
  replay-ui-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run replay UI regression
        run: npx playwright test tests/playwright_replay_ui_fix.spec.js --reporter=line
