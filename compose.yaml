services:
  atas-market-structure:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atas-market-structure
    environment:
      ATAS_MS_HOST: 0.0.0.0
      ATAS_MS_PORT: 8080
      ATAS_MS_DB_PATH: /app/data/market_structure.db
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
