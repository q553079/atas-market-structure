services:
  atas-market-structure:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atas-market-structure
    environment:
      ATAS_MS_HOST: 0.0.0.0
      ATAS_MS_PORT: 8080
      ATAS_MS_DB_PATH: /app/sqlite/market_structure.db
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
      - sqlite_data:/app/sqlite
    restart: unless-stopped
  strategy-library-ocr:
    profiles:
      - ocr
    build:
      context: .
      dockerfile: Dockerfile.ocr
    volumes:
      - ./data:/workspace/data
      - ./docs:/workspace/docs
    restart: "no"
